# Syncs the monitoring User-Agent from 1Password (DevOps vault, item
# "iiif-perf-tests monitoring UA", "credential" field). This value lets
# monitoring traffic skip a Cloudflare WAF/bot-challenge rule on some
# deployments — see README.md "User-Agent" section for why it's never
# hardcoded or documented here.
#
# Requires the target cluster to already have the "onepassword"
# ClusterSecretStore installed (shared ops infra, out of scope for this repo —
# this ExternalSecret will simply fail to sync if it's absent).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: iiif-perf-monitoring-ua
  namespace: iiif-perf-testing
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: iiif-perf-monitoring-ua
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ua
      remoteRef:
        key: iiif-perf-tests monitoring UA/credential
