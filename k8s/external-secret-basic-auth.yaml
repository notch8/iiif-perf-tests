# Syncs basic-auth credentials from 1Password (DevOps vault, item
# "iiif-perf-tests enact basic auth", "username"/"password" fields) for
# staging/pre-launch deployments that sit behind basic auth just to keep
# crawlers out. Optional — see BASIC_AUTH_USER/BASIC_AUTH_PW in README.md.
# Never hardcode these values in job.yaml, even though this particular
# deployment's basic auth is low-sensitivity (crawler deterrence, not a real
# security boundary) — this repo is public and git history is permanent.
#
# Requires the target cluster to already have the "onepassword"
# ClusterSecretStore installed (shared ops infra, out of scope for this repo —
# this ExternalSecret will simply fail to sync if it's absent).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: iiif-perf-basic-auth
  namespace: iiif-perf-testing
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: onepassword
    kind: ClusterSecretStore
  target:
    name: iiif-perf-basic-auth
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: username
      remoteRef:
        key: iiif-perf-tests enact basic auth/username
    - secretKey: password
      remoteRef:
        key: iiif-perf-tests enact basic auth/password
