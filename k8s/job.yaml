apiVersion: batch/v1
kind: Job
metadata:
  name: iiif-perf-test
  namespace: iiif-perf-testing
spec:
  ttlSecondsAfterFinished: 604800  # clean up after 7 days
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: iiif-perf-test
          # :latest tracks main. Pin to a specific :<short-sha> tag instead
          # when a before/after comparison needs the test tool itself held
          # constant across both runs (see .github/workflows/build-image.yml
          # for what tags get pushed).
          image: ghcr.io/notch8/iiif-perf-tests:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              npx playwright test || true
              sleep 3600
          env:
            # The three values to edit before each run, same idea as
            # solr_load_testing's solr_core callout in its README.
            - name: IIIF_TEST_HOST
              value: "demo.enact-knapsack-staging.enacthyku.com"
            - name: IIIF_TEST_WORKS
              value: "concern/portfolio_artefacts/c916900e-d23e-42e7-b5b9-cc6a027b2e64"
            - name: IIIF_TEST_RUN_LABEL
              value: "enact_baseline"
            - name: IIIF_TEST_REPEAT
              value: "15"
            - name: IIIF_TEST_OUTPUT_DIR
              value: "/results"
            - name: IIIF_TEST_UA
              valueFrom:
                secretKeyRef:
                  name: iiif-perf-monitoring-ua
                  key: ua
            # Optional — only needed for deployments behind basic auth (see
            # README's "Basic auth" section). Remove these two if the target
            # deployment doesn't need it.
            - name: BASIC_AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: iiif-perf-basic-auth
                  key: username
            - name: BASIC_AUTH_PW
              valueFrom:
                secretKeyRef:
                  name: iiif-perf-basic-auth
                  key: password
          volumeMounts:
            - name: results
              mountPath: /results
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: iiif-perf-results
